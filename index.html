<style>
/* ─── RESET & ROOT ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0B1220;
  --surface:   #131d2e;
  --surface-2: #1a2740;
  --border:    #243044;
  --text:      #EEF2FF;
  --muted:     #7C8BAA;
  --accent:    #C41230;
  --green:     #16A34A;
  --green-bg:  rgba(22,163,74,.12);
  --red:       #DC2626;
  --red-bg:    rgba(220,38,38,.12);
  --amber:     #D97706;
  --topbar-h:  58px;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; }

/* ─── TOPBAR ───────────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  height: var(--topbar-h);
  background: #080d18;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; gap: 14px;
}
.tb-brand { font-size: 14px; font-weight: 700; white-space: nowrap; letter-spacing: -.01em; }
.tb-brand em { color: var(--accent); font-style: normal; }
.tb-center {
  flex: 1; display: flex; align-items: center;
  justify-content: center; gap: 8px;
}
.wk-btn {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-size: 15px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.wk-btn:hover { background: var(--surface-2); }
#weekLabel {
  font-size: 12px; font-weight: 500; color: var(--text);
  min-width: 186px; text-align: center;
}
.tb-right { display: flex; align-items: center; gap: 10px; }
#saveStatus { font-size: 12px; font-weight: 500; min-width: 86px; text-align: right; }
#saveStatus.saving { color: var(--amber); }
#saveStatus.saved  { color: var(--green); }
#saveStatus.error  {
  color: #fff; font-size: 11px; font-weight: 700;
  background: var(--red); padding: 3px 8px; border-radius: 5px;
  min-width: 0; white-space: nowrap;
  animation: errPulse 1.5s ease-in-out infinite;
}
@keyframes errPulse {
  0%,100% { opacity: 1; } 50% { opacity: 0.6; }
}
.badge {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-size: 10px; font-weight: 600;
  padding: 3px 7px; border-radius: 4px; white-space: nowrap;
  letter-spacing: .03em;
}
.btn {
  padding: 7px 14px; border-radius: 7px;
  font-size: 12px; font-weight: 600; border: none;
  transition: all .15s; cursor: pointer;
}
.btn-ghost {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
}
.btn-ghost:hover { background: var(--surface); color: var(--text); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #2563EB; }

/* ─── MAIN ─────────────────────────────────────────────────── */
#main { min-height: calc(100vh - var(--topbar-h)); }

/* ─── LOADING ──────────────────────────────────────────────── */
.loading-wrap {
  display: flex; align-items: center; justify-content: center;
  min-height: calc(100vh - var(--topbar-h));
  color: var(--muted); gap: 10px; font-size: 14px;
}
.spin {
  width: 18px; height: 18px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .55s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── FADE IN ──────────────────────────────────────────────── */
.fade { animation: fadeUp .2s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── ROLE SELECT ──────────────────────────────────────────── */
.role-screen {

  justify-content: center;

.role-icon { font-size: 34px; }
.role-card h3 { font-size: 15px; font-weight: 700; }
.role-card p  { font-size: 12px; color: var(--muted); line-height: 1.5; }

/* ─── LOGIN CARD ───────────────────────────────────────────── */

/* ─── METRIC GRID ──────────────────────────────────────────── */

<script>

/* ══════════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════════ */

function sk(str) {
  // sanitize to safe Firebase / JS key
  return String(str).replace(/[^a-zA-Z0-9_]/g, '_');
}

function fmt(n) {
  if (n === null || n === undefined || (typeof n === 'number' && isNaN(n))) return '—';
  return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
/* Like fmt but without the $ prefix (used where $ is shown separately) */
function fmtNum(n) {
  if (!n && n !== 0) return '';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function num(v) {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

function pct(n) {
  if (!n) return '—';
  return Number(n).toFixed(1) + '%';
}

/* ══════════════════════════════════════════════════════════════
   WEEK HELPERS
══════════════════════════════════════════════════════════════ */

function isoWeekNum(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dow = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dow);
  const y1 = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil(((d - y1) / 86400000 + 1) / 7);
}

function weekMondayOf(date) {
  const d = new Date(date);
  const dow = d.getDay();
  d.setDate(d.getDate() - dow + (dow === 0 ? -6 : 1));
  d.setHours(0, 0, 0, 0);
  return d;
}

function weekKey(date) {
  const mon = weekMondayOf(date);
  const w = isoWeekNum(mon);
  return `${mon.getFullYear()}-W${String(w).padStart(2, '0')}`;
}

function weekLabel(key) {
  const [yr, wStr] = key.split('-W');
  const w = parseInt(wStr);
  // reconstruct Monday from ISO week
  const jan4 = new Date(parseInt(yr), 0, 4);
  const mon = new Date(jan4);
  mon.setDate(jan4.getDate() - (jan4.getDay() || 7) + 1 + (w - 1) * 7);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `Week ${w} (${M[mon.getMonth()]} ${mon.getDate()} – ${M[sun.getMonth()]} ${sun.getDate()})`;
}

function stepWeek(key, delta) {
  const [yr, wStr] = key.split('-W');
  const w = parseInt(wStr);
  const jan4 = new Date(parseInt(yr), 0, 4);
  const mon = new Date(jan4);
  mon.setDate(jan4.getDate() - (jan4.getDay() || 7) + 1 + (w - 1) * 7);
  mon.setDate(mon.getDate() + delta * 7);
  return weekKey(mon);
}

function initFirebase() {

  } catch(e) {
    console.error('Firebase init failed', e);
    return false;
  }
}

async function loadAll() {
  try {
    const snap = await db.ref(DB_ROOT).get();
    S.data = snap.val() || {};
    // ── Data integrity check ──────────────────────────────────
    const weeks = Object.keys(S.data);
    let totalKeys = 0;
    weeks.forEach(wk => {
      const wd = S.data[wk];
      const repKeys = wd.reps      ? Object.keys(wd.reps).length      : 0;
      const wgtKeys = wd.weightings ? Object.keys(wd.weightings).length : 0;
      const actKeys = wd.actuals   ? Object.keys(wd.actuals).length   : 0;
      totalKeys += repKeys + wgtKeys + actKeys;
      console.log(`[DB] ${wk}: ${repKeys} rep(s), ${wgtKeys} weighting region(s), ${actKeys} actual region(s)`);
    });
    console.log(`[DB] Load complete — ${weeks.length} week(s), ${totalKeys} total top-level key groups`);
  } catch(e) {
    console.warn('[DB] Firebase load failed, falling back to localStorage', e);
    try { S.data = JSON.parse(localStorage.getItem(DB_ROOT) || '{}'); } catch {}
    console.warn('[DB] Loaded from localStorage fallback');
  }
}

function wkData()           { return S.data[S.currentWeek] || {}; }
function repData(rk)        { const d = wkData(); return (d.reps && d.reps[rk]) || {}; }
function wgtData(rgk, rk)   { const d = wkData(); return (d.weightings && d.weightings[rgk] && d.weightings[rgk][rk]) || {}; }
function actData(rgk)       { const d = wkData(); return (d.actuals && d.actuals[rgk]) || {}; }

async function savePath(path, value) {
  setSS('saving');
  try {
    if (!db) throw new Error('no db');
    await db.ref(`${DB_ROOT}/${path}`).set(value);
    // Only write localStorage after a confirmed Firebase success — never as a fallback
    try { localStorage.setItem(DB_ROOT, JSON.stringify(S.data)); } catch {}
    setSS('saved');
  } catch(e) {
    console.error('[DB] Save failed — path:', path, e);
    // Do NOT write to localStorage on failure: it would become a misleading source of truth
    setSS('error');
  }
}

let _ssClear;
function setSS(status) {
  S.saveStatus = status;
  const el = document.getElementById('saveStatus');
  if (!el) return;
  el.className = 'save-status ' + status;
  const map = { saving: 'Saving…', saved: 'Saved ✓', error: '⚠ SAVE FAILED — Do not close tab — contact Spencer' };
  el.textContent = map[status] || '';
  clearTimeout(_ssClear);
  if (status === 'saved') _ssClear = setTimeout(() => setSS(''), 3000);
}

function debounce(key, fn, ms = 800) {
  clearTimeout(debTimers[key]);
  debTimers[key] = setTimeout(fn, ms);
}

/* ══════════════════════════════════════════════════════════════
   CALCULATIONS
══════════════════════════════════════════════════════════════ */

function repCatProj(repName, cat) {
  const d = repData(sk(repName));
  const c = (d && d[sk(cat)]) || {};
  return num(c.amount) * num(c.closePercent) / 100;
}

function mgrCatProj(regionName, repName, cat) {
  const d       = repData(sk(repName));
  const c       = (d && d[sk(cat)]) || {};
  const w       = wgtData(sk(regionName), sk(repName));
  const wp      = num(w[sk(cat)]);
  const repProj = num(c.amount) * num(c.closePercent) / 100;
  // Mgr Projected = Rep Projected × (Mgr% / 100)
  // If no mgr weighting entered, fall back to rep projected as-is
  return wp > 0 ? repProj * wp / 100 : repProj;
}

function repTotals(repName) {
  let forecast = 0, proj = 0, coreFcst = 0, coreProj = 0, eduFcst = 0, eduProj = 0;
  CATEGORIES.forEach(cat => {
    const d  = repData(sk(repName));
    const c  = (d && d[sk(cat)]) || {};
    const a  = num(c.amount);
    const p  = repCatProj(repName, cat);
    forecast += a; proj += p;
    if (CORE_CATS.includes(cat)) { coreFcst += a; coreProj += p; }
    else                          { eduFcst  += a; eduProj  += p; }
  });
  return { forecast, proj, coreFcst, coreProj, eduFcst, eduProj };
}

function repHasMgrWeighting(regionName, repName) {
  const w = wgtData(sk(regionName), sk(repName));
  return CATEGORIES.some(cat => num(w[sk(cat)]) > 0);
}

function regionHasMgrWeighting(regionName) {
  return (REGIONS[regionName] || []).some(rep => repHasMgrWeighting(regionName, rep));
}

function regionTotals(regionName) {
  const reps = REGIONS[regionName] || [];
  let repFcst = 0, repCoreProj = 0, mgrCoreProj = 0, repEduProj = 0, mgrEduProj = 0;
  reps.forEach(rep => {
    const hasWgt = repHasMgrWeighting(regionName, rep);
    CATEGORIES.forEach(cat => {
      const d = repData(sk(rep));
      const c = (d && d[sk(cat)]) || {};
      repFcst += num(c.amount);
      if (CORE_CATS.includes(cat)) {
        repCoreProj += repCatProj(rep, cat);
        if (hasWgt) mgrCoreProj += mgrCatProj(regionName, rep, cat);
      } else {
        repEduProj += repCatProj(rep, cat);
        if (hasWgt) mgrEduProj += mgrCatProj(regionName, rep, cat);
      }
    });
  });
  const act       = actData(sk(regionName));
  const actCore   = num(act.core);
  const actEdu    = num(act.edu);
  const totalMgr  = mgrCoreProj + mgrEduProj;
  const coreAtt   = mgrCoreProj > 0 ? actCore / mgrCoreProj * 100 : 0;
  const totalAtt  = totalMgr    > 0 ? (actCore + actEdu) / totalMgr * 100 : 0;
  return { repFcst, repCoreProj, mgrCoreProj, repEduProj, mgrEduProj, totalMgr, actCore, actEdu, coreAtt, totalAtt };
}

function allTotals() {
  return Object.keys(REGIONS).reduce((acc, r) => {
    const t = regionTotals(r);
    acc.repFcst      += t.repFcst;
    acc.repCoreProj  += t.repCoreProj;
    acc.mgrCoreProj  += t.mgrCoreProj;
    acc.repEduProj   += t.repEduProj;
    acc.mgrEduProj   += t.mgrEduProj;
    acc.totalMgr     += t.totalMgr;
    acc.actCore      += t.actCore;
    acc.actEdu       += t.actEdu;
    return acc;
  }, { repFcst:0, repCoreProj:0, mgrCoreProj:0, repEduProj:0, mgrEduProj:0, totalMgr:0, actCore:0, actEdu:0 });
}

function onRepInput(el) {
  const { rk, ck, f } = el.dataset;
  const val = f === 'notes' ? el.value : num(el.value);

  // Write into local state tree
  const w = S.currentWeek;
  if (!S.data[w])             S.data[w]             = {};
  if (!S.data[w].reps)        S.data[w].reps        = {};
  if (!S.data[w].reps[rk])    S.data[w].reps[rk]    = {};
  if (!S.data[w].reps[rk][ck])S.data[w].reps[rk][ck]= {};
  S.data[w].reps[rk][ck][f] = val;

  // Live recalculate projected column
  liveRepCalc(rk);

  // Debounced save — key includes week to prevent cross-week cancellation
  debounce(`${w}_rep_${rk}_${ck}`, () => {
    savePath(`${w}/reps/${rk}/${ck}`, S.data[w].reps[rk][ck]);
  });
}

function liveRepCalc(rk) {
  const rep = S.rep;
  if (!rep) return;
  const rd  = repData(rk);
  let totalFcst = 0, totalProj = 0;
  CATEGORIES.forEach(cat => {
    const ck = sk(cat);
    const cd = (rd && rd[ck]) || {};
    const p  = num(cd.amount) * num(cd.closePercent) / 100;
    totalFcst += num(cd.amount);
    totalProj += p;
    const el = document.getElementById(`rp_${rk}_${ck}`);
    if (el) el.textContent = p > 0 ? fmt(p) : '—';
  });
  const tgt = TARGETS[rep] || 0;
  const tot = document.getElementById(`rp_total_${rk}`);
  if (tot) {
    tot.textContent = fmt(totalProj);
    tot.className   = tgt > 0 ? (totalProj >= tgt ? 'vg' : 'vr') : '';
  }
}

function toggleExp(rk) {
  S.expanded[rk] = !S.expanded[rk];
  renderManagerView(document.getElementById('main'));

function onMgrWgt(el) {
  const { rgk, rk, ck } = el.dataset;
  const val = num(el.value);
  const w   = S.currentWeek;

  if (!S.data[w])                         S.data[w]                         = {};
  if (!S.data[w].weightings)              S.data[w].weightings              = {};
  if (!S.data[w].weightings[rgk])         S.data[w].weightings[rgk]         = {};
  if (!S.data[w].weightings[rgk][rk])     S.data[w].weightings[rgk][rk]     = {};
  S.data[w].weightings[rgk][rk][ck] = val;

  // Live update
  const mp  = document.getElementById(`mp_${rgk}_${rk}_${ck}`);
  if (mp) {
    const rd      = repData(rk);
    const cd      = (rd && rd[ck]) || {};
    const repProj = num(cd.amount) * num(cd.closePercent) / 100;
    const p       = val > 0 ? repProj * val / 100 : repProj;
    mp.textContent = fmt(p);
  }
  // Update rep totals row
  const repName = ALL_REPS.find(r => sk(r) === rk);
  if (repName) {
    let mc = 0, me = 0;
    CATEGORIES.forEach(cat => {
      const p = mgrCatProj(S.region, repName, cat);
      CORE_CATS.includes(cat) ? mc += p : me += p;
    });
    const mcEl = document.getElementById(`mc_${rk}`);
    const meEl = document.getElementById(`me_${rk}`);
    const mtEl = document.getElementById(`mt_${rk}`);
    if (mcEl) mcEl.textContent = fmt(mc);
    if (meEl) meEl.textContent = fmt(me);
    if (mtEl) mtEl.textContent = fmt(mc + me);
  }

  debounce(`${w}_mgr_${rgk}_${rk}_${ck}`, () => {
    savePath(`${w}/weightings/${rgk}/${rk}/${ck}`, val);
  });
}

          <input type="password" id="ldPwd" placeholder="Enter password"
            onkeydown="if(event.key==='Enter')confirmLeadershipLogin()">
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:6px" onclick="confirmLeadershipLogin()">Login →</button>
        <p class="err-msg" id="ldErr">${S.loginErr}</p>
        <div class="back-row"><span class="back-link" onclick="switchRole()">← Back</span></div>
      </div>
    </div>`;
  if (S.loginErr) document.getElementById('ldErr').style.display = 'block';
}

function confirmLeadershipLogin() {
  const pwd = document.getElementById('ldPwd').value;
  const err = document.getElementById('ldErr');
  if (PASSWORDS['Leadership'] !== pwd) {
    S.loginErr = 'Incorrect password. Please try again.';
    err.textContent = S.loginErr;
    err.style.display = 'block';
    return;
  }
  S.loginErr   = '';
  S.drillRegion = null;
  S.drillRep    = null;
  S.screen      = 'leadershipView';
  render();
}

function exportCSV() {
  const wk  = S.currentWeek;
  const wl  = weekLabel(wk);
  const rows = [];

  // ── Header ──────────────────────────────────────────────────
  rows.push([
    'Week', 'Region', 'Rep',
    'Category', 'Forecast ($)', 'Rep Close %', 'Rep Projected ($)',
    'Mgr Close %', 'Mgr Projected ($)', 'Notes'
  ]);

  // ── Per-rep, per-category detail ────────────────────────────
  Object.keys(REGIONS).forEach(region => {
    const rgk = sk(region);
    REGIONS[region].forEach(rep => {
      const rk = sk(rep);
      const rd = repData(rk);
      CATEGORIES.forEach(cat => {
        const ck   = sk(cat);
        const cd   = (rd && rd[ck]) || {};
        const amt  = num(cd.amount);
        const rcp  = num(cd.closePercent);
        const rprj = amt * rcp / 100;
        const w    = wgtData(rgk, rk);
        const wv   = num(w[ck]);
        const mcp  = wv > 0 ? wv : rcp;
        const mprj = amt * mcp / 100;
        rows.push([
          wl, region, rep, cat,
          amt, rcp, rprj,
          wv > 0 ? wv : '',
          mprj,
          (cd.notes || '').replace(/"/g, '""')
        ]);
      });
    });
  });

  // ── Region summary ───────────────────────────────────────────
  rows.push([]);
  rows.push(['Week', 'Region',
    'Rep Forecast Total', 'Rep Core Projected', 'Mgr Core Forecast',
    'Rep Edu Projected',  'Mgr Edu Forecast',   'Total Mgr Forecast',
    'Actual Core $', 'Actual Edu $', 'Core Attainment %', 'Total Attainment %'
  ]);
  Object.keys(REGIONS).forEach(region => {
    const rt = regionTotals(region);
    rows.push([
      wl, region,
      rt.repFcst, rt.repCoreProj, rt.mgrCoreProj,
      rt.repEduProj, rt.mgrEduProj, rt.totalMgr,
      rt.actCore, rt.actEdu,
      rt.mgrCoreProj > 0 ? rt.coreAtt.toFixed(1) + '%' : '',
      rt.totalMgr    > 0 ? rt.totalAtt.toFixed(1) + '%' : ''
    ]);
  });

  // ── Grand total row ──────────────────────────────────────────
  const at = allTotals();
  const gca = at.mgrCoreProj > 0 ? (at.actCore / at.mgrCoreProj * 100).toFixed(1) + '%' : '';
  const gta = at.totalMgr    > 0 ? ((at.actCore + at.actEdu) / at.totalMgr * 100).toFixed(1) + '%' : '';
  rows.push([
    wl, 'GRAND TOTAL',
    at.repFcst, at.repCoreProj, at.mgrCoreProj,
    at.repEduProj, at.mgrEduProj, at.totalMgr,
    at.actCore, at.actEdu, gca, gta
  ]);

  // ── Build CSV string ─────────────────────────────────────────
  const csv = rows.map(r =>
    r.map(cell => {
      const s = String(cell ?? '');
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? `"${s}"` : s;
    }).join(',')
  ).join('\r\n');

  // ── Trigger download ─────────────────────────────────────────
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const safe = wk.replace(/[^a-zA-Z0-9_-]/g, '_');
  a.href     = url;
  a.download = `NorismedicalForecast_${safe}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

/* Strip commas → parse raw number from formatted input */
function vpRaw(el) { return num(el.value.replace(/,/g, '')); }

/* While typing: allow only digits and commas (live comma-format) */
function onVpForecast(el) {
  const raw = el.value.replace(/[^0-9]/g, '');
  const n   = raw ? parseInt(raw, 10) : 0;
  /* keep cursor near end while typing by formatting inline */
  el.value  = raw ? fmtNum(n) : '';
  const val = n;
  const key = 'vp_forecast_' + S.currentWeek;
  S.data[key] = val;
  debounce('vp_' + S.currentWeek, () => { savePath(key, val); });
}

/* On focus: strip commas so user can type digits cleanly */
function onVpFocus(el) {
  const raw = el.value.replace(/,/g, '');
  el.value  = raw === '0' ? '' : raw;
}

/* On blur: re-apply comma formatting */
function onVpBlur(el) {
  const n = num(el.value.replace(/,/g, ''));
  el.value = n ? fmtNum(n) : '';
}

/* ══════════════════════════════════════════════════════════════
   CSV IMPORT
══════════════════════════════════════════════════════════════ */

function importCSV() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv,text/csv';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => parseAndPreviewCSV(evt.target.result);
    reader.readAsText(file);
  };
  input.click();
}

function parseCSVLine(line) {
  const result = [];
  let field = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i + 1] === '"') { field += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      result.push(field.trim()); field = '';
    } else {
      field += ch;
    }
  }
  result.push(field.trim());
  return result;
}

function parseAndPreviewCSV(text) {
  const rows = text.split(/\r?\n/).filter(l => l.trim()).map(parseCSVLine);

  // Locate section headers
  let detailStart = -1, summaryStart = -1;
  rows.forEach((r, i) => {
    if (r[0] === 'Week' && r[3] === 'Category')           detailStart  = i + 1;
    if (r[0] === 'Week' && r[2] === 'Rep Forecast Total') summaryStart = i + 1;
  });

  if (detailStart < 0) {
    alert('Could not parse CSV — missing detail header. Make sure you are using a file exported from this app.');
    return;
  }

  const w = S.currentWeek;
  const repWrites = [], wgtWrites = [], actWrites = [];

  // ── Detail rows (rep + category data) ───────────────────────
  for (let i = detailStart; i < rows.length; i++) {
    const r = rows[i];
    if (!r[0] || r[0] === 'Week') continue;
    if (r.length < 8) break;
    const [, region, rep, cat, fcstStr,  closeStr, , mgrCloseStr, , notes] = r;
    if (!rep || !cat || !region) continue;
    const rk  = sk(rep), ck = sk(cat), rgk = sk(region);
    const amt = num(fcstStr.replace(/[$, ]/g, ''));
    const cp  = num(closeStr);
    const mc  = num(mgrCloseStr);

    repWrites.push({
      path:  `${w}/reps/${rk}/${ck}`,
      value: { amount: amt, closePercent: cp, notes: notes || '' },
      label: `${rep} › ${cat} — Forecast: ${fcstStr}, Close: ${closeStr}%`,
      stateWriter: () => {
        if (!S.data[w])             S.data[w]             = {};
        if (!S.data[w].reps)        S.data[w].reps        = {};
        if (!S.data[w].reps[rk])    S.data[w].reps[rk]    = {};
        S.data[w].reps[rk][ck] = { amount: amt, closePercent: cp, notes: notes || '' };
      }
    });

    if (mc > 0) {
      wgtWrites.push({
        path:  `${w}/weightings/${rgk}/${rk}/${ck}`,
        value: mc,
        label: `${region} › ${rep} › ${cat} = ${mc}%`,
        stateWriter: () => {
          if (!S.data[w])                           S.data[w]                           = {};
          if (!S.data[w].weightings)                S.data[w].weightings                = {};
          if (!S.data[w].weightings[rgk])           S.data[w].weightings[rgk]           = {};
          if (!S.data[w].weightings[rgk][rk])       S.data[w].weightings[rgk][rk]       = {};
          S.data[w].weightings[rgk][rk][ck] = mc;
        }
      });
    }
  }

  // ── Summary rows (actuals) ───────────────────────────────────
  if (summaryStart >= 0) {
    for (let i = summaryStart; i < rows.length; i++) {
      const r = rows[i];
      if (r.length < 10) break;
      const region = r[1];
      if (!region || region === 'GRAND TOTAL') continue;
      const rgk     = sk(region);
      const actCore = num((r[8] || '').replace(/[$, ]/g, ''));
      const actEdu  = num((r[9] || '').replace(/[$, ]/g, ''));

      if (actCore > 0) {
        actWrites.push({
          path: `${w}/actuals/${rgk}/core`, value: actCore,
          label: `${region} Core Actual = ${fmt(actCore)}`,
          stateWriter: () => {
            if (!S.data[w])               S.data[w]               = {};
            if (!S.data[w].actuals)       S.data[w].actuals       = {};
            if (!S.data[w].actuals[rgk])  S.data[w].actuals[rgk]  = {};
            S.data[w].actuals[rgk].core = actCore;
          }
        });
      }
      if (actEdu > 0) {
        actWrites.push({
          path: `${w}/actuals/${rgk}/edu`, value: actEdu,
          label: `${region} Edu Actual = ${fmt(actEdu)}`,
          stateWriter: () => {
            if (!S.data[w])               S.data[w]               = {};
            if (!S.data[w].actuals)       S.data[w].actuals       = {};
            if (!S.data[w].actuals[rgk])  S.data[w].actuals[rgk]  = {};
            S.data[w].actuals[rgk].edu = actEdu;
          }
        });
      }
    }
  }

  pendingImport = [...repWrites, ...wgtWrites, ...actWrites];
  showImportModal(repWrites, wgtWrites, actWrites);
}

function showImportModal(repWrites, wgtWrites, actWrites) {
  const total = repWrites.length + wgtWrites.length + actWrites.length;

  const section = (title, items) => !items.length ? '' : `
    <div style="margin-bottom:14px">
      <div class="imp-section-lbl">${title} (${items.length})</div>
      <div class="imp-list">${items.map(x => `<div>${x.label}</div>`).join('')}</div>
    </div>`;

  const overlay = document.createElement('div');
  overlay.id = 'impOverlay';
  overlay.className = 'imp-overlay';
  overlay.innerHTML = `
    <div class="imp-modal">
      <h3>Import CSV — Preview</h3>
      <p class="imp-sub">
        Target: <strong style="color:var(--text)">${weekLabel(S.currentWeek)}</strong>.
        Each key will be written to its own isolated Firebase path.
        Review all changes before confirming.
      </p>
      ${section('Rep Forecast Data', repWrites)}
      ${section('Manager Weightings', wgtWrites)}
      ${section('Actual Closed Values', actWrites)}
      ${total === 0 ? '<p style="color:var(--amber);font-size:14px">No importable data found in this file.</p>' : ''}
      <div class="imp-actions">
        <button class="btn btn-ghost" onclick="closeImportModal()">Cancel</button>
        ${total > 0 ? `<button class="btn btn-primary" onclick="confirmImport()">
          Import ${total} change${total !== 1 ? 's' : ''} →
        </button>` : ''}
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeImportModal() {
  const el = document.getElementById('impOverlay');
  if (el) el.remove();
  pendingImport = null;
}

async function confirmImport() {
  if (!pendingImport || !pendingImport.length) { closeImportModal(); return; }
  closeImportModal();

  setSS('saving');
  let failed = 0;
  // Write each key to its own isolated path — never bulk set
  for (const item of pendingImport) {
    item.stateWriter(); // update local state first
    try {
      if (!db) throw new Error('no db');
      await db.ref(`${DB_ROOT}/${item.path}`).set(item.value);
    } catch(e) {
      console.error('[DB] Import write failed — path:', item.path, e);
      failed++;
    }
  }
  pendingImport = null;

  if (failed > 0) {
    setSS('error');
    console.error(`[DB] Import completed with ${failed} failed write(s)`);
  } else {
    try { localStorage.setItem(DB_ROOT, JSON.stringify(S.data)); } catch {}
    setSS('saved');
  }

  // Re-render the leadership view with imported data
  renderLeadershipView(document.getElementById('main'));
}

function onActual(el) {
  const { rgk, t } = el.dataset;
  const val = num(el.value);
  const w   = S.currentWeek;

  if (!S.data[w])               S.data[w]               = {};
  if (!S.data[w].actuals)       S.data[w].actuals       = {};
  if (!S.data[w].actuals[rgk])  S.data[w].actuals[rgk]  = {};
  S.data[w].actuals[rgk][t] = val;

  // Live DOM update — no re-render needed
  liveActualCalc(rgk);

  debounce(`${w}_act_${rgk}_${t}`, () => {
    savePath(`${w}/actuals/${rgk}/${t}`, val);
  });
}

function liveActualCalc(rgk) {
  // ── Region attainment cells ──────────────────────────────────
  const regionName = Object.keys(REGIONS).find(r => sk(r) === rgk);
  if (regionName) {
    const rt     = regionTotals(regionName);
    const hasWgt = regionHasMgrWeighting(regionName);
    const cAtt = (hasWgt && rt.mgrCoreProj > 0)
      ? `<span class="${rt.coreAtt >= 100 ? 'att-g':'att-r'}">${rt.coreAtt.toFixed(1)}%</span>` : '—';
    const tAtt = (hasWgt && rt.totalMgr > 0)
      ? `<span class="${rt.totalAtt >= 100 ? 'att-g':'att-r'}">${rt.totalAtt.toFixed(1)}%</span>` : '—';
    const cEl = document.getElementById(`latt_core_${rgk}`);
    const tEl = document.getElementById(`latt_tot_${rgk}`);
    if (cEl) cEl.innerHTML = cAtt;
    if (tEl) tEl.innerHTML = tAtt;
  }

  // ── Grand total row ──────────────────────────────────────────
  const at = allTotals();
  const gca = at.mgrCoreProj > 0 ? at.actCore / at.mgrCoreProj * 100 : 0;
  const gta = at.totalMgr    > 0 ? (at.actCore + at.actEdu) / at.totalMgr * 100 : 0;
  const el = id => document.getElementById(id);
  if (el('gt_actcore'))  el('gt_actcore').textContent  = fmt(at.actCore);
  if (el('gt_actedu'))   el('gt_actedu').textContent   = fmt(at.actEdu);
  if (el('gt_core_att')) el('gt_core_att').innerHTML   = gca > 0 ? `<span class="${gca >= 100 ? 'att-g':'att-r'}">${gca.toFixed(1)}%</span>` : '—';
  if (el('gt_tot_att'))  el('gt_tot_att').innerHTML    = gta > 0 ? `<span class="${gta >= 100 ? 'att-g':'att-r'}">${gta.toFixed(1)}%</span>` : '—';

  // ── Actual Closed metric card ────────────────────────────────
  const actualTotal = at.actCore + at.actEdu;
  let cls = 'mc-white';
  if (at.totalMgr > 0) {
    const ratio = actualTotal / at.totalMgr;
    cls = ratio >= 1.0 ? 'mc-green' : ratio >= 0.9 ? 'mc-amber' : 'mc-red';
  }
  const card = document.getElementById('mc_actual_card');
  const val  = document.getElementById('mc_actual_val');
  if (card) card.className = `metric-card ${cls}`;
  if (val)  val.textContent = fmt(actualTotal);
}

/* ══════════════════════════════════════════════════════════════
   LEADERSHIP — REGION DRILLDOWN
══════════════════════════════════════════════════════════════ */

function drillRegion(region) {
  S.drillRegion = region;
  S.drillRep    = null;
  render();
}

function renderRegionDrill(main) {
  const region = S.drillRegion;
  const reps   = REGIONS[region] || [];

  const rows = reps.map(rep => {
    const t      = repTotals(rep);
    const hasWgt = repHasMgrWeighting(region, rep);
    let mc = 0, me = 0;
    if (hasWgt) {
      CATEGORIES.forEach(cat => {
        const p = mgrCatProj(region, rep, cat);
        CORE_CATS.includes(cat) ? mc += p : me += p;
      });
    }
    const mgrTotal = mc + me;
    const tgt = TARGETS[rep];

    // Total Mgr Proj: green if >= target, red if below; blank if no weighting entered
    let mgrCls = 'col-white';
    if (hasWgt && tgt) mgrCls = mgrTotal >= tgt ? 'col-green' : 'col-red';

    return `
      <tr>
        <td><button class="xbtn" onclick="drillRep('${rep}','${region}')">${rep}</button></td>
        <td>${fmt(t.forecast)}</td>
        <td class="col-white">${fmt(t.coreProj)}</td>
        <td>${hasWgt ? fmt(mc) : '—'}</td>
        <td>${fmt(t.eduProj)}</td>
        <td>${hasWgt ? fmt(me) : '—'}</td>
        <td class="${hasWgt ? mgrCls : ''}">${hasWgt ? fmt(mgrTotal) : '—'}</td>
        <td>${tgt ? fmt(tgt) : '—'}</td>
      </tr>`;
  }).join('');

  const rt = regionTotals(region);

  main.innerHTML = `
    <div class="cont fade">
      <div class="sec-hd">
        <div>
          <span class="back-link" onclick="S.drillRegion=null;render()">← Back to Overview</span>
          <h2 style="margin-top:8px">${region} — Rep Breakdown</h2>
          <div class="sub">${weekLabel(S.currentWeek)}</div>
        </div>
      </div>
      <div class="tcard">
        <table>
          <thead><tr>
            <th>Rep</th>
            <th>Rep Forecast</th>
            <th class="col-white">Rep Core Proj</th>
            <th>Mgr Core Proj</th>
            <th>Rep Edu Proj</th>
            <th>Mgr Edu Proj</th>
            <th class="col-white">Total Mgr Proj</th>
            <th>Non EDU Target</th>
          </tr></thead>
          <tbody>
            ${rows}
            <tr class="total-row">
              <td>Region Total</td>
              <td>${fmt(rt.repFcst)}</td>
              <td class="col-white">${fmt(rt.repCoreProj)}</td>
              <td>${fmt(rt.mgrCoreProj)}</td>
              <td>${fmt(rt.repEduProj)}</td>
              <td>${fmt(rt.mgrEduProj)}</td>
              <td class="col-white">${fmt(rt.totalMgr)}</td>
              <td>—</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════════════════
   LEADERSHIP — REP DRILLDOWN
══════════════════════════════════════════════════════════════ */

function drillRep(rep, region) {
  S.drillRep    = rep;
  S.drillRegion = region;
  render();
}

function renderRepDrill(main) {
  const rep    = S.drillRep;
  const region = S.drillRegion;
  const rk     = sk(rep);
  const rgk    = sk(region);
  const rd     = repData(rk);
  const tgt    = TARGETS[rep];

  const rows = CATEGORIES.map(cat => {
    const ck  = sk(cat);
    const cd  = (rd && rd[ck]) || {};
    const amt = num(cd.amount);
    const cp  = num(cd.closePercent);
    const rpp = amt * cp / 100;
    const w   = wgtData(rgk, rk);
    const wv  = num(w[ck]);
    const mp  = mgrCatProj(region, rep, cat);
    const notes = cd.notes || '—';
    return `
      <tr>
        <td>${cat}</td>
        <td>${fmt(amt)}</td>
        <td>${cp ? cp + '%' : '—'}</td>
        <td>${fmt(rpp)}</td>
        <td>${wv ? wv + '%' : '<span style="color:var(--muted);font-size:11px">Using rep %</span>'}</td>
        <td>${fmt(mp)}</td>
        <td style="color:var(--muted)">${notes}</td>
      </tr>`;
  }).join('');

  const t = repTotals(rep);
  let mc = 0, me = 0;
  CATEGORIES.forEach(cat => {
    const p = mgrCatProj(region, rep, cat);
    CORE_CATS.includes(cat) ? mc += p : me += p;
  });

  main.innerHTML = `
    <div class="cont-md fade">
      <div class="sec-hd">
        <div>
          <span class="back-link" onclick="S.drillRep=null;render()">← Back to ${region}</span>
          <h2 style="margin-top:8px">${rep} — Category Breakdown</h2>
          <div class="sub">
            ${weekLabel(S.currentWeek)}
            ${tgt ? ` &nbsp;·&nbsp; Non EDU Target: <strong style="color:var(--text)">${fmt(tgt)}</strong>` : ''}
          </div>
        </div>
      </div>
      <div class="tcard">
        <table>
          <thead><tr>
            <th>Category</th><th>Forecast</th><th>Rep Close %</th>
            <th>Rep Projected</th><th>Mgr Close %</th><th>Mgr Projected</th><th>Notes</th>
          </tr></thead>
          <tbody>
            ${rows}
            <tr class="total-row">
              <td>Total</td>
              <td>${fmt(t.forecast)}</td>
              <td>—</td>
              <td>${fmt(t.proj)}</td>
              <td>—</td>
              <td>${fmt(mc + me)}</td>
              <td>—</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════════════ */

function selectRole(role) {
  S.role     = role;
  S.loginErr = '';
  S.screen   = role === 'rep' ? 'repSelect' : role === 'manager' ? 'managerLogin' : 'leadershipLogin';
  render();
}

function switchRole() {
  S.role = S.rep = S.region = null;
  S.loginErr = S.drillRegion = S.drillRep = null;
  S.expanded = {};
  S.screen   = 'roleSelect';
  render();
}

function changeWeek(delta) {
  S.currentWeek = stepWeek(S.currentWeek, delta);
  render();
}

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */

async function init() {
  S.screen = 'loading';
  render();
  initFirebase();
  await loadAll();
  S.screen = 'roleSelect';
  render();
}

init();
</script>
</body>
</html>
